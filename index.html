<!DOCTYPE html>
<html>
<head>
  <title>NeuroCalm 🌿</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }
    #chat {
      height: 300px;
      overflow-y: auto;
      border: 1px solid #333;
      padding: 10px;
      margin-bottom: 10px;
    }
    input {
      padding: 10px;
      width: 70%;
    }
    button {
      padding: 10px;
      background: #22c55e;
      border: none;
      color: white;
    }
  </style>
</head>
<body>

<h1>NeuroCalm 🌿</h1>

<div id="chat"></div>

<input id="input" placeholder="Type hoe je je voelt..." />
<button onclick="send()">Send</button>

<script>
async function send() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const userText = input.value;
  if (!userText) return;

  chat.innerHTML += "<div><b>Jij:</b> " + userText + "</div>";
  input.value = "";

  try {
    const res = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer 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

      },
      body: JSON.stringify({
        model: "gpt-4o-mini",
        messages: [
          { role: "system", content: "You are NeuroCalm, a calm mental health assistant." },
          { role: "user", content: userText }
        ]
      })
    });

    const data = await res.json();

    const reply = data.choices?.[0]?.message?.content || "Geen antwoord";

    chat.innerHTML += "<div><b>NeuroCalm:</b> " + reply + "</div>";
    chat.scrollTop = chat.scrollHeight;

  } catch (err) {
    chat.innerHTML += "<div><b>NeuroCalm:</b> Fout met AI ❌</div>";
  }
}
</script>
